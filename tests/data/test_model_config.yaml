inputs:
  cells:
    shape: [null, 4] # pt eta phi layer

layers:
  encode_cells:
    class: EncodeCellEt
    inputs: [cells]
    params:
      encoder_layer: QuadLinearQuantiser
      encoder_config:
        trainable: true

  towers:
    class: VectorsToImage
    inputs: [encode_cells]
    params:
      return_layers: true
      filter_layers: [0, 1, 2, 3, 4, 5]

  pileup:
    class: PileupCNN
    inputs: [towers]

  jets:
    class: ConeJet
    inputs: [pileup]

  calib:
    class: CalibrationMLP
    inputs: [jets]

  pt_1:
    class: NthLeadingPt
    inputs: [calib]
    params:
      index: 1

  pt_4:
    class: NthLeadingPt
    inputs: [calib]
    params:
      index: 4

outputs:
  pt_1:
     loss: mse
  pt_4:
    loss: MeanAbsoluteError
    loss_weight: 0.5
  calib:
    loss: CalibrationLoss

optimiser:
  class: adam
  params:
    learning_rate: 0.001
    clipnorm: 1.

random_state: 42
